<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Dash - Top Analytics Edition</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Ad Container Style */
        .ad-slot {
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 320px;
            height: 50px;
            background: #111; /* Placeholder color */
        }

        #game-container {
            position: relative;
            border: 4px solid #fff200;
            background: #000;
            width: 800px;
            max-width: 95vw;
        }
        
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            box-sizing: border-box;
            z-index: 10;
            background: rgba(0,0,0,0.3);
        }

        #score { font-size: 24px; color: #fff200; font-weight: bold; }
        #analysis-report { font-size: 18px; color: #00ffcc; border: 1px solid #00ffcc; padding: 2px 10px; border-radius: 5px; }

        canvas { display: block; width: 100%; }
        
        #controls {
            margin-top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .jump-btn {
            width: 150px;
            height: 70px;
            background: #fff200;
            color: black;
            border: none;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 242, 0, 0.4);
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 20;
            text-align: center;
        }
        .hidden { display: none !important; }
        
        .btn-style {
            padding: 15px 35px;
            background: #fff200;
            border: none;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
            border-radius: 5px;
            margin: 10px;
        }
        #confirm-btn { background: #00ffcc; color: #000; }
    </style>
</head>
<body>

    <div class="ad-slot">
        <script type="text/javascript">
            atOptions = {
                'key' : '7f93a586b56b369c214c97bd39b9ec0d',
                'format' : 'iframe',
                'height' : 50,
                'width' : 320,
                'params' : {}
            };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/7f93a586b56b369c214c97bd39b9ec0d/invoke.js"></script>
    </div>

    <div id="game-container">
        <div id="top-bar">
            <div id="score">Score: 0</div>
            <div id="analysis-report">Launch Clicks: 0</div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="overlay">
            <div id="game-over-ad" class="ad-slot hidden">
                </div>

            <h1 id="title" style="color:#fff200">NEON DASH</h1>
            <p id="msg">Game start karne ke liye button dabayein</p>
            
            <button id="start-btn" class="btn-style" onclick="showConfirmButton()">START GAME</button>
            <button id="confirm-btn" class="btn-style hidden" onclick="finalizeStart()">CLICK TO LAUNCH 🚀</button>
        </div>
    </div>

    <div id="controls">
        <button class="jump-btn" onmousedown="handleJump()" ontouchstart="handleJump()">JUMP</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const scoreEl = document.getElementById('score');
        const reportEl = document.getElementById('analysis-report');
        const gameOverAd = document.getElementById('game-over-ad');

        canvas.width = 800;
        canvas.height = 400;

        let player = { x: 80, y: 340 - 50, w: 50, h: 50, dy: 0, jumpForce: 14, grounded: false };
        let obstacles = [];
        let score = 0;
        let gameActive = false;
        let launchClicks = 0; 
        let speed = 7;
        let gravity = 0.8;

        function showConfirmButton() {
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('confirm-btn').classList.remove('hidden');
            document.getElementById('msg').innerText = "Ab Launch button par click karein!";
        }

        function finalizeStart() {
            launchClicks++; 
            reportEl.innerText = `Launch Clicks: ${launchClicks}`;
            overlay.classList.add('hidden');
            gameOverAd.classList.add('hidden'); // Hide ad when game starts
            resetGame();
            gameActive = true;
            animate();
        }

        function resetGame() {
            score = 0; speed = 7; obstacles = [];
            player.y = 340 - player.h;
            player.dy = 0;
            scoreEl.innerText = `Score: 0`;
        }

        function handleJump() {
            if (player.grounded && gameActive) {
                player.dy = -player.jumpForce;
                player.grounded = false;
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') handleJump();
        });

        function animate() {
            if (!gameActive) return;

            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#222";
            ctx.fillRect(0, 340, canvas.width, 60);
            ctx.fillStyle = "#fff200";
            ctx.fillRect(0, 340, canvas.width, 3);

            player.dy += gravity;
            player.y += player.dy;

            if (player.y + player.h > 340) {
                player.y = 340 - player.h;
                player.dy = 0;
                player.grounded = true;
            }

            ctx.fillStyle = "#fff200";
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.font = "38px Arial";
            ctx.fillText("🚀", player.x + 4, player.y + 40);

            if (Math.random() < 0.018) {
                obstacles.push({ x: canvas.width, y: 340 - 50, w: 35, h: 50 });
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= speed;
                ctx.fillStyle = "#ff0055";
                ctx.fillRect(obstacles[i].x, obstacles[i].y, obstacles[i].w, obstacles[i].h);

                if (player.x < obstacles[i].x + obstacles[i].w &&
                    player.x + player.w > obstacles[i].x &&
                    player.y < obstacles[i].y + obstacles[i].h &&
                    player.y + player.h > obstacles[i].y) {
                    gameOver();
                }

                if (obstacles[i].x + obstacles[i].w < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreEl.innerText = `Score: ${score}`;
                    speed += 0.1;
                }
            }
            requestAnimationFrame(animate);
        }

        function gameOver() {
            gameActive = false;
            overlay.classList.remove('hidden');
            gameOverAd.classList.remove('hidden'); // Show ad on Game Over
            document.getElementById('start-btn').classList.remove('hidden');
            document.getElementById('confirm-btn').classList.add('hidden');
            document.getElementById('title').innerText = "GAME OVER! 💀";
            document.getElementById('msg').innerText = "Score: " + score;
        }
    </script>
</body>
</html>
